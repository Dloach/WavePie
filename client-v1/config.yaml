input:
  provider: ble
  mouse:
    sensitivity: 1.0
    button_map:
      main_button: <Button-1>
      aux_buttons:
        <Button-3>: 1
        <Key-F1>: 2
        <Key-F2>: 3
gesture:
  dead_zone: 0.05
  sensitivity: 1.2
  acceleration: true
buttons:
- button_id: 0
  route: overlay
  label: 主按钮
  menu_items:
  - id: copy
    label: 复制
    icon: ''
    action_type: log
    action_payload: ctrl+c
  - id: paste
    label: 粘贴
    icon: ''
    action_type: log
    action_payload: ctrl+v
  - id: screenshot
    label: 截图
    icon: ''
    action_type: log
    action_payload: win+shift+s
  - id: undo
    label: 撤销
    icon: ''
    action_type: log
    action_payload: ctrl+z
  - id: lock
    label: 锁定
    icon: ''
    action_type: log
    action_payload: win+l
  - id: search
    label: 搜索
    icon: ''
    action_type: log
    action_payload: ctrl+f
  - id: save
    label: 保存
    icon: ''
    action_type: log
    action_payload: ctrl+s
  - id: close
    label: 关闭
    icon: ''
    action_type: log
    action_payload: alt+f4
  - id: tab_new
    label: 新建标签
    icon: ''
    action_type: log
    action_payload: ctrl+t
  - id: tab_close
    label: 关闭标签
    icon: ''
    action_type: log
    action_payload: ctrl+w
  - id: emoji
    label: 表情
    icon: ''
    action_type: log
    action_payload: win+.
  - id: taskman
    label: 任务管理器
    icon: ''
    action_type: log
    action_payload: ctrl+shift+esc
- button_id: 1
  route: direct
  label: 右键→截图
  action_type: key_combo
  action_payload: win+shift+s
- button_id: 2
  route: direct
  label: F1→粘贴 Markdown
  action_type: macro
  action_payload: paste_markdown
- button_id: 3
  route: direct
  label: F2→音量静音
  action_type: key_combo
  action_payload: volume_mute
scroll:
  up:
    action_type: key_combo
    action_payload: volume_up
  down:
    action_type: key_combo
    action_payload: volume_down
feedback_rules:
  on_connect:
    led_color: green
    led_pattern: solid
  on_action_ok:
    led_color: green
    led_pattern: slow_blink
  on_action_fail:
    led_color: red
    led_pattern: fast_blink
    buzzer: true
ui:
  overlay_opacity: 0.85
  font_size: 14
  item_height: 40
  item_padding: 10
  highlight_color: '#4A90D9'
